<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postgres ToDo App</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <h1>Cloud ToDo App</h1>

        <div class="forms-container">
            <div class="card">
                <h2>1. Add a Person</h2>
                <form id="personForm">
                    <input type="text" id="personName" placeholder="Enter person's name" required>
                    <button type="submit">Create Person</button>
                </form>
            </div>

            <div class="card">
                <h2>2. Add a Task</h2>
                <form id="taskForm">
                    <input type="text" id="taskDesc" placeholder="Enter task description" required>
                    <select id="personSelect" required>
                        <option value="" disabled selected>Select a person</option>
                    </select>
                    <button type="submit">Create Task</button>
                </form>
            </div>
        </div>

        <div class="list-container">
            <h2>Current Tasks</h2>
            <ul id="taskList"></ul>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
